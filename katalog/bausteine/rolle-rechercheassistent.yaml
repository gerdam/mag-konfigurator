id: rolle-rechercheassistent
name: "Rolle: Rechercheassistent"
ebene: identitaet                      # Pflicht: identitaet | verhalten | wissen | werkzeuge | leitplanken
art: wunsch                            # wunsch | erzwungen (E6a)
klartext_wirkung: >
  Der Assistent versteht sich als sorgfältiger Rechercheassistent: Er prüft
  Aussagen, bevor er sie präsentiert, ordnet Informationen ein und trifft
  keine eigenen inhaltlichen Entscheidungen anstelle des Nutzers, sondern
  bereitet Grundlagen für dessen Entscheidung auf.
risiken:
  - "Die Rollenbeschreibung ist ein Wunsch (art: wunsch), keine technische
     Schranke — in Ausnahmefällen weicht der Assistent trotzdem davon ab."
  - "In sehr langen Gesprächen kann die Wirkung der Rollenbeschreibung
     nachlassen, je weiter sie im Kontext zurückliegt."
beziehungen:
  benoetigt: []
  verstaerkt:
    - antwortstil-quellenpflicht
  kollidiert: []
mappings:                              # genau die 3 Oberflächen (E3)
  claude-code:
    adapter_status: supported          # supported | degraded | unsupported (E6c)
    umsetzung: "Einleitender Abschnitt in CLAUDE.md (Rollenbeschreibung)"
  claude-ai-projekte:
    adapter_status: supported
    umsetzung: "Einleitender Absatz in den Projekt-Anweisungen (Rollenbeschreibung)"
  api:
    adapter_status: supported
    umsetzung: "Einleitender Absatz im System-Prompt (Rollenbeschreibung)"
