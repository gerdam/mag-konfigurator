name: CI

on:
  push:
  pull_request:

# Verhindert Doppellaeufe, wenn push und pull_request denselben Stand
# betreffen. cancel-in-progress bleibt false: jeder Task-Commit behaelt
# laut Arbeitsregel seinen eigenen gruenen Lauf als CI-Nachweis.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pruefungen:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt
      - name: Python-Tests
        run: python -m unittest discover -s tools/tests -v
      - name: App-Tests
        run: python -m unittest discover -s app/tests -t . -v
      - name: JS-Tests
        run: node --test "app/jstests/**/*.test.js"
      - name: Dokument- und Katalogpruefung
        run: powershell -File tools\check-docs.ps1
